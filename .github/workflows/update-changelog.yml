name: Update Changelog on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  update-changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Append entry to CHANGELOG.md
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          MERGE_DATE: ${{ github.event.pull_request.merged_at }}
        run: |
          DATE=$(echo "$MERGE_DATE" | cut -c1-10)
          ENTRY="## [$DATE] — PR #$PR_NUMBER: $PR_TITLE\n\n"
          ENTRY+="**Branch:** \`$PR_BRANCH\`  \n"
          ENTRY+="**Merged by:** $PR_AUTHOR\n\n"
          if [ -n "$PR_BODY" ]; then
            ENTRY+="### Description\n$PR_BODY\n\n"
          fi
          ENTRY+="---\n"

          # Insert new entry after the header (line 5 — after the intro paragraph and first ---)
          awk -v entry="$ENTRY" '
            /^---$/ && !inserted {
              print; print ""; printf "%s", entry; inserted=1; next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG for PR #${{ github.event.pull_request.number }}"
          git push origin main
